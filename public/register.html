<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — CineTrack</title>
  <link rel="icon" type="image/png" href="/img/logo.png">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-bg-art"></div>
  <div class="auth-card">
    <div class="auth-logo">
      <a href="/" class="logo-text">CINETRACK</a>
      <div class="logo-sub">Create your account</div>
    </div>
    <div id="authError" class="form-error" style="margin-bottom:16px; display:none"></div>
    <div style="display:flex; flex-direction:column; gap:16px">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-input" placeholder="johndoe" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn btn-primary" id="registerBtn" style="margin-top:8px; width:100%">Sign Up</button>
      <div id="googleAuthContainer" style="margin-top: 8px; display: flex; justify-content: center;"></div>
    </div>

    <!-- OTP Verification Form (Hidden by default) -->
    <div id="otpSection" style="display:none; flex-direction:column; gap:16px">
      <div class="logo-sub" style="margin-bottom:16px; color:var(--accent)">Verify your email</div>
      <p style="font-size:0.9rem; color:var(--text-muted); margin-bottom:8px">We've sent a 6-digit code to <b id="displayEmail"></b></p>
      <div class="form-group">
        <label class="form-label">Verification Code</label>
        <input type="text" id="otpCode" class="form-input" placeholder="123456" maxlength="6" style="text-align:center; font-size:1.5rem; letter-spacing:8px">
      </div>
      <button class="btn btn-primary" id="verifyBtn" style="width:100%">Verify Account</button>
      <div style="text-align:center; font-size:0.85rem; margin-top:8px">
        <span id="timerText">Code expires in <b id="timerDisplay" style="color:var(--accent)">30s</b></span>
        <span id="resendContainer" style="display:none">
          Code expired. <a href="#" id="resendBtn" style="color:var(--accent)">Resend new code</a>
        </span>
      </div>
    </div>
    <div class="auth-switch">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = '/';

  let otpTimerInterval;
  function startOtpTimer() {
    clearInterval(otpTimerInterval);
    let timeLeft = 30;
    const display = document.getElementById('timerDisplay');
    const timerText = document.getElementById('timerText');
    const resendContainer = document.getElementById('resendContainer');
    const verifyBtn = document.getElementById('verifyBtn');
    
    timerText.style.display = 'inline';
    resendContainer.style.display = 'none';
    verifyBtn.disabled = false;
    display.textContent = '30s';
    
    otpTimerInterval = setInterval(() => {
      timeLeft--;
      if (timeLeft <= 0) {
        clearInterval(otpTimerInterval);
        timerText.style.display = 'none';
        resendContainer.style.display = 'inline';
        verifyBtn.disabled = true;
      } else {
        display.textContent = timeLeft + 's';
      }
    }, 1000);
  }

  document.getElementById('registerBtn').addEventListener('click', async () => {
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('authError');
    const btn = document.getElementById('registerBtn');
    
    if (!username || !email || !password) { 
      errEl.textContent = 'Please fill all fields'; 
      errEl.style.display='block'; 
      return; 
    }
    
    if (!email.toLowerCase().endsWith('@gmail.com')) {
      errEl.textContent = 'Please use an official Google Mail (@gmail.com) address';
      errEl.style.display = 'block';
      return;
    }
    
    btn.textContent = 'Signing up…'; 
    btn.disabled = true;
    
    try {
      const data = await api.auth.register({ username, email, password });
      
      if (data.unverified) {
        document.querySelector('.auth-card > div:nth-child(3)').style.display = 'none';
        document.getElementById('otpSection').style.display = 'flex';
        document.getElementById('displayEmail').textContent = email;
        document.querySelector('.logo-sub').textContent = 'Almost there…';
        startOtpTimer();
        toast('Verification code sent!', 'info');
      } else {
        Auth.setAuth(data);
        toast('Welcome to CineTrack!', 'success');
        setTimeout(() => window.location.href = '/', 500);
      }
    } catch(e) {
      errEl.textContent = e.message; 
      errEl.style.display = 'block';
      btn.textContent = 'Sign Up'; 
      btn.disabled = false;
    }
  });

  // Verify OTP Logic
  document.getElementById('verifyBtn').addEventListener('click', async () => {
    const email = document.getElementById('displayEmail').textContent;
    const code = document.getElementById('otpCode').value.trim();
    const errEl = document.getElementById('authError');
    const btn = document.getElementById('verifyBtn');

    if (!code || code.length !== 6) {
      errEl.textContent = 'Please enter the 6-digit code';
      errEl.style.display = 'block';
      return;
    }

    btn.textContent = 'Verifying…';
    btn.disabled = true;

    try {
      const data = await api.auth.verify({ email, code });
      Auth.setAuth(data);
      toast('Account verified!', 'success');
      setTimeout(() => window.location.href = '/', 500);
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
      btn.textContent = 'Verify Account';
      btn.disabled = false;
    }
  });

  // Resend OTP Logic
  document.getElementById('resendBtn').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = document.getElementById('displayEmail').textContent;
    try {
      await api.auth.resend({ email });
      startOtpTimer();
      toast('New code sent!', 'success');
    } catch (e) {
      toast(e.message, 'error');
    }
  });
  
  document.getElementById('password').addEventListener('keydown', e => { 
    if(e.key==='Enter') document.getElementById('registerBtn').click(); 
  });

  document.getElementById('otpCode').addEventListener('keydown', e => {
    if(e.key==='Enter') document.getElementById('verifyBtn').click();
  });

  // Initialize Google Auth
  async function initGoogleAuth() {
    try {
      const { clientId } = await api.auth.googleClientId();
      if (clientId) {
        const script = document.createElement('script');
        script.src = "https://accounts.google.com/gsi/client";
        script.async = true;
        script.defer = true;
        document.head.appendChild(script);

        window.handleGoogleCredential = async (response) => {
          try {
            const data = await api.auth.google({ credential: response.credential });
            Auth.setAuth(data);
            toast('Welcome to CineTrack!', 'success');
            setTimeout(() => window.location.href = '/', 500);
          } catch(e) {
            const errEl = document.getElementById('authError');
            errEl.textContent = e.message; errEl.style.display = 'block';
          }
        };

        script.onload = () => {
          google.accounts.id.initialize({
            client_id: clientId,
            callback: handleGoogleCredential
          });
          google.accounts.id.renderButton(
            document.getElementById("googleAuthContainer"),
            { theme: "outline", size: "large", width: "100%", text: "signup_with" }
          );
        };
      }
    } catch (e) { console.error('Error fetching Google Client ID', e); }
  }
  initGoogleAuth();
</script>
</body>
</html>
